<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Starway Chat</title>
<style>
/* ═══════════════════════════════════════════
   RESET & VARIABLES
═══════════════════════════════════════════ */
:root{
  --bg:#f0f4f8;
  --sb:#1e3a5f;
  --sb2:#162f4d;
  --surface:#fff;
  --border:#e2e8f0;
  --text:#2d3748;
  --muted:#718096;
  --dim:#a0aec0;
  --accent:#3182ce;
  --green:#38a169;
  --danger:#e53e3e;
  --r:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --sw:240px;
  --tbh:52px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{
  height:100%;
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}
#app{
  display:flex;
  flex-direction:column;
  height:100%;
  height:100svh;
}

/* ── Top bar ── */
#tb{
  display:flex;align-items:center;gap:8px;
  background:var(--sb);
  height:var(--tbh);
  padding:0 12px;
  flex-shrink:0;
  z-index:30;
}
#tb-menu{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:6px;line-height:1;touch-action:manipulation;}
#tb-logo{font-size:14px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tb-online{font-size:11px;color:rgba(255,255,255,.75);background:rgba(255,255,255,.12);padding:3px 9px;border-radius:10px;cursor:pointer;white-space:nowrap;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
#tb-av{width:28px;height:28px;border-radius:7px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#tb-uname{font-size:11px;color:rgba(255,255,255,.75);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tb-logout{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.85);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;touch-action:manipulation;font-family:var(--font);}

/* ── Body row ── */
#row{display:flex;flex:1;overflow:hidden;min-height:0;position:relative;}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
#sb{
  width:var(--sw);min-width:var(--sw);
  background:var(--sb);
  display:flex;flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
}
#sb-srch{padding:10px 10px 6px;}
#sb-srch input{
  width:100%;padding:7px 10px;
  background:rgba(255,255,255,.1);border:none;
  border-radius:var(--r);color:#fff;
  font-size:13px;font-family:var(--font);outline:none;
}
#sb-srch input::placeholder{color:rgba(255,255,255,.4);}
#sb-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px;}
#sb-list::-webkit-scrollbar{width:3px;}
#sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.sec{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;}
.sec-add{background:none;border:none;color:rgba(255,255,255,.4);font-size:19px;cursor:pointer;padding:2px 4px;line-height:1;touch-action:manipulation;}
.sec-add:hover,.sec-add:active{color:#fff;}
.cr{
  display:flex;align-items:center;gap:6px;
  padding:7px 10px 7px 14px;
  cursor:pointer;font-size:13.5px;
  color:rgba(255,255,255,.6);
  border-radius:5px;margin:1px 6px;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
  position:relative;
}
.cr:hover,.cr:active{background:rgba(255,255,255,.1);color:#fff;}
.cr.active{background:rgba(255,255,255,.2);color:#fff;font-weight:600;}
.cr .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cr .lock{font-size:10px;opacity:.5;flex-shrink:0;}
.cr .cog{
  opacity:0;font-size:12px;background:none;border:none;
  color:rgba(255,255,255,.6);cursor:pointer;
  padding:3px 5px;border-radius:3px;flex-shrink:0;
  touch-action:manipulation;
}
.cr:hover .cog{opacity:1;}
.cr .cog:hover,.cr .cog:active{color:#fff;background:rgba(255,255,255,.15);}
.sm-av{width:22px;height:22px;border-radius:5px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);flex-shrink:0;}
.pdot.on{background:#48bb78;}

/* ═══════════════════════════════════════════
   MAIN PANEL
═══════════════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--surface);}

/* ── Channel header ── */
#ch-hdr{
  height:var(--tbh);padding:0 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;background:#fff;
}
#ch-ico{font-size:16px;color:var(--muted);flex-shrink:0;}
#ch-ttl{font-size:15px;font-weight:700;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#ch-settings-btn{
  background:none;border:1px solid var(--border);
  border-radius:var(--r);padding:4px 10px;
  font-size:12px;color:var(--muted);cursor:pointer;
  white-space:nowrap;display:none;
  touch-action:manipulation;font-family:var(--font);
}
#ch-settings-btn:hover{background:#edf2f7;color:var(--text);}
#live{
  font-size:11px;color:var(--green);
  background:#f0fff4;border:1px solid #c6f6d5;
  border-radius:10px;padding:2px 8px;
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Messages ── */
#msgs{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 14px;display:flex;flex-direction:column;
  min-height:0;
}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ddiv{display:flex;align-items:center;gap:8px;margin:12px 0 6px;}
.ddiv hr{flex:1;border:none;border-top:1px solid var(--border);}
.ddiv span{font-size:11px;color:var(--dim);white-space:nowrap;}
.mg{display:flex;gap:9px;padding:4px 6px;border-radius:8px;margin:1px 0;}
.mg:hover{background:#f7fafc;}
.mav{width:34px;height:34px;border-radius:8px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mb{flex:1;min-width:0;}
.mm{display:flex;align-items:baseline;gap:8px;margin-bottom:1px;flex-wrap:wrap;}
.ms{font-size:13px;font-weight:700;color:var(--text);}
.me{font-size:11px;color:var(--dim);}
.mt{font-size:11px;color:var(--dim);}
.mx{font-size:14px;color:#4a5568;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.rxns{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.rx{background:#edf2f7;border:1px solid var(--border);border-radius:12px;padding:2px 7px;font-size:12px;cursor:pointer;color:var(--text);touch-action:manipulation;}
.rx:hover,.rx:active{background:#e2e8f0;}
.rx.mine{background:#ebf8ff;border-color:#bee3f8;color:var(--accent);}
.arxn{opacity:0;font-size:13px;background:none;border:1px solid transparent;color:var(--dim);cursor:pointer;padding:2px 5px;border-radius:10px;touch-action:manipulation;}
.mg:hover .arxn{opacity:1;}

/* ── Input bar — KEY: flex-shrink:0 keeps it visible ── */
#inp-bar{
  flex-shrink:0;
  padding:8px 12px;
  padding-bottom:max(12px, env(safe-area-inset-bottom));
  background:#fff;
  border-top:1px solid var(--border);
}
#inp-box{
  display:flex;align-items:flex-end;
  border:1.5px solid var(--border);
  border-radius:var(--r);background:#fff;
  transition:border-color .15s;
}
#inp-box:focus-within{border-color:var(--accent);}
#inp{
  flex:1;background:none;border:none;outline:none;
  padding:10px 10px;font-size:16px;/* 16px prevents iOS zoom */
  color:var(--text);font-family:var(--font);
  resize:none;min-height:42px;max-height:110px;
  line-height:1.4;overflow-y:auto;
}
#inp::placeholder{color:var(--dim);}
.itl{display:flex;align-items:center;padding:5px 6px;gap:1px;flex-shrink:0;}
.ibtn{background:none;border:none;cursor:pointer;color:var(--dim);padding:5px;border-radius:4px;font-size:18px;line-height:1;touch-action:manipulation;}
.ibtn:hover,.ibtn:active{color:var(--accent);}
#sbtn{
  background:var(--accent);border:none;cursor:pointer;
  color:#fff;padding:7px 14px;margin:5px;
  border-radius:var(--r);font-size:14px;font-weight:600;
  font-family:var(--font);white-space:nowrap;
  touch-action:manipulation;
}
#sbtn:active{opacity:.8;}
#sbtn:disabled{opacity:.35;cursor:default;}

/* ═══════════════════════════════════════════
   ACTIVE USERS PANEL
═══════════════════════════════════════════ */
#up{width:190px;min-width:190px;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#up-h{height:var(--tbh);padding:0 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;font-size:13px;font-weight:700;color:var(--text);gap:6px;flex-shrink:0;}
#up-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;}
.ur{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;touch-action:manipulation;}
.ur:hover,.ur:active{background:#ebf8ff;}
.uav{width:30px;height:30px;border-radius:8px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.uprs{position:absolute;bottom:-2px;right:-2px;width:8px;height:8px;border-radius:50%;border:2px solid #fff;background:#48bb78;}
.uinf{flex:1;min-width:0;}
.un{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ue{font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dmb{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;color:var(--accent);cursor:pointer;flex-shrink:0;touch-action:manipulation;font-family:var(--font);}
.dmb:active{background:#ebf8ff;}

/* ═══════════════════════════════════════════
   EMOJI PICKER
═══════════════════════════════════════════ */
#epick{
  position:fixed;bottom:70px;right:12px;z-index:7000;
  background:#fff;border:1px solid var(--border);
  border-radius:var(--r);padding:8px;
  display:none;grid-template-columns:repeat(7,1fr);
  gap:2px;box-shadow:0 4px 20px rgba(0,0,0,.12);
}
.ep{background:none;border:none;cursor:pointer;font-size:20px;padding:5px;border-radius:4px;touch-action:manipulation;}
.ep:active{background:#edf2f7;}

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
.mo{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);
  z-index:8000;display:flex;align-items:center;
  justify-content:center;padding:16px;
  -webkit-overflow-scrolling:touch;
}
.md{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:22px;
  width:400px;max-width:100%;
  box-shadow:0 8px 30px rgba(0,0,0,.15);
  max-height:88vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.md h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;}
.md label{font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.md input,.md select{
  width:100%;padding:9px 11px;
  background:#f7fafc;border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--text);
  font-size:16px;/* 16px stops iOS zoom */
  font-family:var(--font);outline:none;margin-bottom:12px;
}
.md input:focus,.md select:focus{border-color:var(--accent);background:#fff;}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.ma button{
  padding:9px 18px;border-radius:var(--r);font-size:13px;
  font-weight:600;cursor:pointer;border:1.5px solid var(--border);
  background:#f7fafc;color:var(--text);font-family:var(--font);
  touch-action:manipulation;
}
.ma button.p{background:var(--accent);color:#fff;border-color:transparent;}
.ma button.d{background:var(--danger);color:#fff;border-color:transparent;}
.ma button:active{opacity:.8;}
.mtags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:32px;padding:6px 8px;background:#f7fafc;border:1.5px solid var(--border);border-radius:var(--r);}
.mtag{background:#ebf8ff;color:var(--accent);border:1px solid #bee3f8;border-radius:4px;padding:2px 7px;font-size:12px;display:flex;align-items:center;gap:4px;}
.mtag button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:13px;padding:0;line-height:1;touch-action:manipulation;}
.slist{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-top:-9px;margin-bottom:11px;overflow:hidden;display:none;}
.si{padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text);touch-action:manipulation;}
.si:hover,.si:active{background:#ebf8ff;color:var(--accent);}
.sdiv{border:none;border-top:1px solid var(--border);margin:12px 0;}
.dz{background:#fff5f5;border:1px solid #fed7d7;border-radius:var(--r);padding:11px 13px;}
.dz p{font-size:12px;color:#c53030;margin-bottom:8px;}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#2d3748;color:#fff;font-size:13px;
  border-radius:var(--r);padding:10px 18px;z-index:9000;
  opacity:0;transition:opacity .2s;pointer-events:none;
  white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;}

/* ═══════════════════════════════════════════
   WELCOME / LOGIN SCREEN
═══════════════════════════════════════════ */
#welcome{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:var(--bg);
  z-index:9999;
  display:none;
  align-items:center;justify-content:center;
  padding:20px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
#wcard{
  background:#fff;border:1px solid var(--border);
  border-radius:16px;padding:32px 24px;
  width:360px;max-width:100%;
  text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);
}
#wcard .logo{font-size:44px;margin-bottom:12px;}
#wcard h2{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
#wcard p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
#wcard .wlabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;text-align:left;margin-bottom:5px;}
#wcard input{
  width:100%;padding:11px 13px;
  background:#f7fafc;border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--text);
  font-size:16px;font-family:var(--font);
  outline:none;margin-bottom:12px;text-align:center;
}
#wcard input:focus{border-color:var(--accent);background:#fff;}
#wcard button{
  width:100%;padding:12px;background:var(--accent);
  color:#fff;border:none;border-radius:var(--r);
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:var(--font);touch-action:manipulation;
}
#wcard button:active{opacity:.85;}
#werr{font-size:12px;color:var(--danger);margin-top:8px;min-height:16px;text-align:left;}

/* ═══════════════════════════════════════════
   SIDEBAR OVERLAY (mobile)
═══════════════════════════════════════════ */
#sbov{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);
  z-index:55;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:700px){
  #tb-menu{display:block;}
  #tb-uname{display:none;}
  #sb{
    position:fixed;
    top:calc(var(--tbh) + env(safe-area-inset-top));
    left:0;bottom:0;
    z-index:60;
    transform:translateX(-110%);
    transition:transform .22s ease;
    width:270px;min-width:270px;
  }
  #sb.open{transform:translateX(0);}
  #sbov.open{display:block;}
  #up{display:none;}
  #ch-settings-btn{display:none !important;}
}
@media(max-width:960px){
  #up{display:none;}
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>

<!-- ══ Welcome / Login ════════════════════════════════════ -->
<div id="welcome">
  <div id="wcard">
    <div class="logo">✈️</div>
    <h2>Starway UAE Chat</h2>
    <p>Sign in with your Starway work email to start chatting with your team. Your identity is tied to your email address.</p>
    <label class="wlabel">Your Full Name</label>
    <input id="w-name" type="text" placeholder="e.g. Alex Chen" maxlength="50"
      autocomplete="name" onkeydown="if(event.key==='Enter')document.getElementById('w-email').focus()"/>
    <label class="wlabel">Work Email Address</label>
    <input id="w-email" type="email" placeholder="e.g. alex@company.com" maxlength="100"
      autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div id="werr"></div>
    <br/>
    <button onclick="doLogin()">Enter Chat →</button>
  </div>
</div>

<!-- ══ Sidebar overlay ════════════════════════════════════ -->
<div id="sbov" onclick="closeSB()"></div>

<!-- ══ App ════════════════════════════════════════════════ -->
<div id="app">

  <!-- Top bar -->
  <div id="tb">
    <button id="tb-menu" onclick="toggleSB()">☰</button>
    <span id="tb-logo">✈️ Starway UAE</span>
    <span id="tb-online" onclick="toggleUP()">● 0 online</span>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <div id="tb-av"></div>
      <span id="tb-uname"></span>
      <button id="tb-logout" onclick="doLogout()">⏏ Logout</button>
    </div>
  </div>

  <!-- Body row -->
  <div id="row">

    <!-- Sidebar -->
    <div id="sb">
      <div id="sb-srch">
        <input type="text" placeholder="🔍 Search channels…" oninput="filterCh(this.value)"/>
      </div>
      <div id="sb-list">
        <div class="sec">
          Channels
          <button class="sec-add" onclick="openNewCh()" title="New channel">＋</button>
        </div>
        <div id="chlist"></div>
        <div class="sec" style="margin-top:6px;">
          Direct Messages
          <button class="sec-add" onclick="openNewDM()" title="New DM">＋</button>
        </div>
        <div id="dmlist"></div>
      </div>
    </div>

    <!-- Main -->
    <div id="main">
      <div id="ch-hdr">
        <span id="ch-ico">#</span>
        <span id="ch-ttl">general</span>
        <button id="ch-settings-btn" onclick="openChSettings(activeId)">⚙ Settings</button>
        <div id="live"><div class="ldot"></div>Live</div>
      </div>
      <div id="msgs"></div>
      <div id="inp-bar">
        <div id="inp-box">
          <textarea id="inp" placeholder="Message #general" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="itl">
            <button class="ibtn" onclick="toggleEP()" title="Emoji">😊</button>
          </div>
          <button id="sbtn" onclick="send()">Send ↑</button>
        </div>
      </div>
    </div>

    <!-- Active users -->
    <div id="up">
      <div id="up-h">👥 Active Users</div>
      <div id="up-list"></div>
    </div>

  </div>
</div>

<!-- ══ Emoji picker ════════════════════════════════════════ -->
<div id="epick"></div>

<!-- ══ Toast ══════════════════════════════════════════════ -->
<div id="toast"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════
//  CONFIG  — admin sets this before sharing the file
// ═══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbykNejJmNA55P0ShPR5mF3buUeYxd_HGe-0mqvxDKZwYd4MJiPfjW1vbkZjQcgZytdyJw/exec';

// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const POLL_MS = 5000;
const HB_MS   = 20000;
const EMOJIS  = ['👍','❤️','😂','🎉','🔥','👏','✅','🚀','💡','😊','🙏','⚡','💪','🎯','📌','👀','❓','💬','🛠️','📅','😎','🌟'];
const AVC = [
  ['#fff','#3182ce'],['#fff','#38a169'],['#fff','#805ad5'],
  ['#fff','#dd6b20'],['#fff','#e53e3e'],['#fff','#0987a0'],
  ['#fff','#b7791f'],['#fff','#2c7a7b'],
];

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let ME_NAME  = '';   // display name
let ME_EMAIL = '';   // unique identifier
let activeId = 'general';
let channels = [], dms = [], onlineUsers = [];
let cache = {}, lastTs = {};
let pollT = null, hbT = null;
let emojiTarget = null, invitedM = [];

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
window.addEventListener('load', () => {
  buildEP();
  const savedName  = localStorage.getItem('mc_name')  || '';
  const savedEmail = localStorage.getItem('mc_email') || '';
  if (savedName && savedEmail) {
    ME_NAME  = savedName;
    ME_EMAIL = savedEmail;
    startApp();
  } else {
    showWelcome();
  }
});

function showWelcome() {
  document.getElementById('welcome').style.display = 'flex';
  setTimeout(() => document.getElementById('w-name').focus(), 100);
}

function doLogin() {
  const name  = document.getElementById('w-name').value.trim();
  const email = document.getElementById('w-email').value.trim().toLowerCase();
  const err   = document.getElementById('werr');

  if (!name)  { err.textContent = 'Please enter your full name.'; shake('w-name'); return; }
  if (!email) { err.textContent = 'Please enter your email address.'; shake('w-email'); return; }
  if (!email.includes('@') || !email.includes('.')) {
    err.textContent = 'Please enter a valid email address.';
    shake('w-email'); return;
  }
  err.textContent = '';
  ME_NAME  = name;
  ME_EMAIL = email;
  localStorage.setItem('mc_name',  name);
  localStorage.setItem('mc_email', email);
  document.getElementById('welcome').style.display = 'none';
  startApp();
}

function doLogout() {
  if (!confirm('Sign out of Starway Chat?')) return;
  clearInterval(pollT);
  clearInterval(hbT);
  localStorage.removeItem('mc_name');
  localStorage.removeItem('mc_email');
  ME_NAME = ME_EMAIL = '';
  // Reset state
  channels=[]; dms=[]; onlineUsers=[]; cache={}; lastTs={};
  document.getElementById('w-name').value  = '';
  document.getElementById('w-email').value = '';
  document.getElementById('werr').textContent = '';
  showWelcome();
}

async function startApp() {
  // Set topbar avatar
  const av = ava(ME_NAME);
  const avEl = document.getElementById('tb-av');
  avEl.style.cssText = `width:28px;height:28px;border-radius:7px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;background:${av.bg};color:${av.fg};flex-shrink:0;`;
  avEl.textContent = av.i;
  document.getElementById('tb-uname').textContent = ME_NAME;

  if (!API_URL || API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    document.getElementById('msgs').innerHTML = notConfiguredMsg();
    document.getElementById('inp').placeholder = 'Configure API URL first';
    document.getElementById('sbtn').disabled = true;
    return;
  }

  try { await post({action:'setup'}); } catch(e){}
  await loadChannels();
  renderSB();
  await switchTo(activeId);
  startPoll();
  doHB();
  hbT = setInterval(doHB, HB_MS);
}

function notConfiguredMsg() {
  return `<div style="max-width:440px;margin:50px auto;background:#fff8e1;border:1.5px solid #f6c000;border-radius:10px;padding:24px;text-align:center;">
    <div style="font-size:32px;margin-bottom:10px">⚠️</div>
    <div style="font-size:15px;font-weight:700;color:#744210;margin-bottom:8px">API URL not configured</div>
    <div style="font-size:13px;color:#975a16;line-height:1.7">
      Open <strong>starway-chat.html</strong> in a text editor and replace<br>
      <code style="background:#fef3c7;padding:2px 6px;border-radius:4px">YOUR_APPS_SCRIPT_URL_HERE</code><br>
      with your Google Apps Script Web App URL.<br><br>
      See <strong>SETUP.txt</strong> for step-by-step instructions.
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════
async function post(b) {
  const r = await fetch(API_URL, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(b), redirect:'follow',
  });
  return r.json();
}
async function get(p) {
  const r = await fetch(API_URL + '?' + new URLSearchParams(p), {redirect:'follow'});
  return r.json();
}

// ═══════════════════════════════════════════════════
//  PRESENCE
// ═══════════════════════════════════════════════════
async function doHB() {
  try {
    await post({action:'heartbeat', user:ME_EMAIL, name:ME_NAME});
    const d = await get({action:'getOnlineUsers'});
    onlineUsers = d.users || [];
    document.getElementById('tb-online').textContent = `● ${onlineUsers.length} online`;
    renderUP();
    renderSB();
  } catch(e){}
}

function renderUP() {
  const ul = document.getElementById('up-list');
  if (!onlineUsers.length) {
    ul.innerHTML = '<div style="font-size:12px;color:var(--dim);text-align:center;padding:18px 8px">No one else online</div>';
    return;
  }
  ul.innerHTML = onlineUsers.map(u => {
    const isMe = u.email === ME_EMAIL;
    const av = ava(u.name);
    return `<div class="ur" onclick="${isMe?'':("startDMWith('" + escJ(u.email) + "','" + escJ(u.name) + "')")}">
      <div class="uav" style="background:${av.bg};color:${av.fg}">
        ${av.i}
        <div class="uprs"></div>
      </div>
      <div class="uinf">
        <div class="un">${escH(u.name)}${isMe?' (you)':''}</div>
        <div class="ue">${escH(u.email)}</div>
      </div>
      ${!isMe ? `<button class="dmb" onclick="event.stopPropagation();startDMWith('${escJ(u.email)}','${escJ(u.name)}')">DM</button>` : ''}
    </div>`;
  }).join('');
}

function toggleUP() {
  const p = document.getElementById('up');
  if (window.innerWidth > 960) return;
  p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
  if (p.style.display === 'flex') p.style.flexDirection = 'column';
}

async function startDMWith(email, name) {
  closeSB();
  const emails = [ME_EMAIL, email].sort();
  const id = 'dm_' + emails.map(e=>e.replace(/[^a-z0-9]/gi,'_')).join('__');
  const members = [ME_EMAIL + ':' + ME_NAME, email + ':' + (name||email)];
  try {
    const r = await post({action:'addChannel', id, name:id, desc:'', isDM:true, members});
    if (r.ok || r.error === 'Channel already exists') {
      if (!dms.find(d=>d.id===id)) dms.push({id, members});
      renderSB();
      await switchTo(id);
    }
  } catch(e){ toast('Could not open DM'); }
}

// ═══════════════════════════════════════════════════
//  CHANNELS
// ═══════════════════════════════════════════════════
async function loadChannels() {
  try {
    const d = await get({action:'getChannels'});
    channels = d.channels || [];
    dms      = d.dms || [];
  } catch(e) { toast('Could not load channels'); }
}

function renderSB(f) {
  const filt = (f||'').toLowerCase();

  const vis = channels.filter(c => {
    if (c.id.startsWith('dm_')) return false;
    if (filt && !c.name.toLowerCase().includes(filt)) return false;
    if (c.members && c.members.length) {
      return c.members.some(m => m.split(':')[0] === ME_EMAIL);
    }
    return true;
  });

  document.getElementById('chlist').innerHTML = vis.map(c => {
    const act = c.id === activeId;
    return `<div class="cr${act?' active':''}" onclick="switchTo('${escJ(c.id)}');closeSB()">
      <span style="font-size:15px;opacity:.55;flex-shrink:0">#</span>
      <span class="lbl">${escH(c.name)}</span>
      ${c.password ? '<span class="lock">🔒</span>' : ''}
      <button class="cog" onclick="event.stopPropagation();openChSettings('${escJ(c.id)}')" title="Settings">⚙</button>
    </div>`;
  }).join('');

  const onlineEmails = onlineUsers.map(u => u.email);
  document.getElementById('dmlist').innerHTML = dms.map(d => {
    const act = d.id === activeId;
    const other = parseDMOther(d);
    const av = ava(other.name);
    const ol = onlineEmails.includes(other.email);
    return `<div class="cr${act?' active':''}" onclick="switchTo('${escJ(d.id)}');closeSB()">
      <div class="sm-av" style="background:${av.bg};color:${av.fg}">${av.i}</div>
      <span class="lbl">${escH(other.name || other.email)}</span>
      <div class="pdot${ol?' on':''}"></div>
    </div>`;
  }).join('');
}

function parseDMOther(d) {
  if (d.members && d.members.length) {
    const otherMem = d.members.find(m => m.split(':')[0] !== ME_EMAIL);
    if (otherMem) {
      const parts = otherMem.split(':');
      return { email: parts[0], name: parts.slice(1).join(':') || parts[0] };
    }
  }
  // Fallback: parse from ID
  const emailPart = d.id.replace(/^dm_/,'').split('__').find(p => p.replace(/_/g,'@') !== ME_EMAIL.replace(/[^a-z0-9]/gi,'_'));
  return { email: emailPart||'', name: emailPart||d.id };
}

function filterCh(v) { renderSB(v); }

async function switchTo(id) {
  activeId = id;
  renderSB();
  closeSB();

  const ch   = channels.find(c=>c.id===id);
  const dm   = dms.find(d=>d.id===id);
  const isDM = !!dm;

  // Password check
  if (ch && ch.password) {
    const saved = sessionStorage.getItem('p_'+id);
    if (saved !== ch.password) {
      const entered = prompt(`🔒 #${ch.name} is password-protected.\nEnter the channel password:`);
      if (entered !== ch.password) {
        toast('Incorrect password — access denied');
        activeId = 'general';
        renderSB();
        return;
      }
      sessionStorage.setItem('p_'+id, entered);
    }
  }

  const label = isDM ? parseDMOther(dm).name : (ch ? ch.name : id);
  document.getElementById('ch-ico').textContent  = isDM ? '👤' : '#';
  document.getElementById('ch-ttl').textContent  = label || id;
  document.getElementById('inp').placeholder     = `Message ${isDM?'':'#'}${label||id}`;

  const settBtn = document.getElementById('ch-settings-btn');
  settBtn.style.display = (!isDM && ch) ? 'inline-block' : 'none';

  await fetchMsgs(id, false);
  scrollBot();
}

async function saveChSettings(id) {
  const desc = document.getElementById('cs-desc').value.trim();
  const pass = document.getElementById('cs-pass').value;
  try {
    const r = await post({action:'updateChannel', id, desc, password:pass});
    if (!r.ok) { toast(r.error || 'Could not update channel'); return; }
    if (invitedM.length > 0) {
      const r2 = await post({action:'inviteMembers', id, members:invitedM});
      if (r2.ok) { const ch=channels.find(c=>c.id===id); if(ch) ch.members=r2.members; }
    }
    const ch = channels.find(c=>c.id===id);
    if (ch) { ch.desc=desc; ch.password=pass; }
    if (pass) sessionStorage.setItem('p_'+id, pass);
    else sessionStorage.removeItem('p_'+id);
    document.querySelector('.mo').remove();
    renderSB();
    toast('✅ Settings saved');
    invitedM = [];
  } catch(e) { toast('Error: '+e.message); }
}

async function deleteCh(id) {
  if (!confirm(`Delete #${id} and ALL its messages? This cannot be undone.`)) return;
  try {
    const r = await post({action:'deleteChannel', id});
    if (r.ok) {
      channels = channels.filter(c=>c.id!==id);
      document.querySelector('.mo').remove();
      renderSB();
      if (activeId===id) await switchTo('general');
      toast('Channel deleted');
    } else { toast(r.error||'Could not delete'); }
  } catch(e) { toast('Error: '+e.message); }
}

    <input id="nc-pass" type="password" placeholder="Leave blank for open channel"/>
    <label>Invite Members <span style="font-weight:400;text-transform:none">(optional — by email)</span></label>
    <div class="mtags" id="inv-tags-nc"></div>
    <input id="inv-inp-nc" placeholder="Type name or email, press Enter…" autocomplete="off"
      oninput="showSug(this.value,'inv-sug-nc','inv-nc')" onkeydown="iKD(event,'inv-tags-nc','inv-inp-nc','inv-sug-nc')"/>
    <div class="slist" id="inv-sug-nc"></div>
    <div class="ma">
      <button onclick="this.closest('.mo').remove()">Cancel</button>
      <button class="p" onclick="createCh()">Create Channel</button>
    </div>
  `);
  document.body.appendChild(ol);
  setTimeout(()=>document.getElementById('nc-name').focus(), 80);
}

async function createCh() {
  const raw  = document.getElementById('nc-name').value.trim();
  const name = raw.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const desc = document.getElementById('nc-desc').value.trim();
  const pass = document.getElementById('nc-pass').value.trim();
  const members = (pass || invitedM.length) ? [ME_EMAIL+':'+ME_NAME, ...invitedM] : [];

  if (!name) { shake('nc-name'); return; }
  if (channels.find(c=>c.id===name||c.name===name)) {
    toast('⚠️ Channel "'+name+'" already exists');
    document.getElementById('nc-name').style.borderColor='var(--danger)';
    return;
  }

  try {
    const r = await post({action:'addChannel', id:name, name, desc, password:pass, members});
    if (r.ok) {
      channels.push({id:name,name,desc,password:pass,members});
      invitedM=[];
      document.querySelector('.mo').remove();
      if (pass) sessionStorage.setItem('p_'+name, pass);
      renderSB();
      await switchTo(name);
    } else if (r.error==='duplicate') {
      toast('⚠️ '+r.message);
      document.getElementById('nc-name').style.borderColor='var(--danger)';
    } else { toast(r.error||'Could not create channel'); }
  } catch(e){ toast('Error: '+e.message); }
}

async function qDM(email, name) {
  document.querySelector('.mo').remove();
  await startDMWith(email, name);
}
async function createDM() {
  const val = document.getElementById('dm-inp').value.trim();
  if (!val) return;
  document.querySelector('.mo').remove();
  // Try to match against online users by name or email
  const match = onlineUsers.find(u=>u.email===val.toLowerCase()||u.name.toLowerCase()===val.toLowerCase());
  if (match) await startDMWith(match.email, match.name);
  else await startDMWith(val.toLowerCase(), val);
}

// ═══════════════════════════════════════════════════
//  MEMBER SUGGEST
// ═══════════════════════════════════════════════════
function showSug(val, sugId, mode) {
  const sug = document.getElementById(sugId); if (!sug) return;
  if (!val.trim()) { sug.style.display='none'; return; }
  const v = val.toLowerCase();
  let pool;
  if (mode === 'dm') pool = onlineUsers.filter(u=>u.email!==ME_EMAIL);
  else pool = onlineUsers.filter(u=>u.email!==ME_EMAIL && !invitedM.find(m=>m.split(':')[0]===u.email));

  const m = pool.filter(u=>u.name.toLowerCase().includes(v)||u.email.toLowerCase().includes(v)).slice(0,5);
  if (!m.length) { sug.style.display='none'; return; }
  sug.style.display='block';

  if (mode==='dm') {
    sug.innerHTML = m.map(u=>`<div class="si" onclick="document.getElementById('dm-inp').value='${escJ(u.email)}';document.getElementById('dm-sug').style.display='none'">${escH(u.name)} <span style="color:var(--dim);font-size:11px">${escH(u.email)}</span></div>`).join('');
  } else {
    const tagsId = mode==='inv-cs'?'inv-tags-cs':'inv-tags-nc';
    const inpId  = mode==='inv-cs'?'inv-inp-cs':'inv-inp-nc';
    sug.innerHTML = m.map(u=>`<div class="si" onclick="addInv('${escJ(u.email+':'+u.name)}','${tagsId}','${inpId}','${sugId}')">${escH(u.name)} <span style="color:var(--dim);font-size:11px">${escH(u.email)}</span></div>`).join('');
  }
}

function addInv(val, tagsId, inpId, sugId) {
  if (!invitedM.includes(val)) { invitedM.push(val); renderTags(tagsId); }
  document.getElementById(inpId).value='';
  document.getElementById(sugId).style.display='none';
}
function remInv(val, tagsId) { invitedM=invitedM.filter(m=>m!==val); renderTags(tagsId); }
function renderTags(tagsId) {
  document.getElementById(tagsId).innerHTML = invitedM.map(m=>{
    const parts=m.split(':'); const label=parts.slice(1).join(':')||parts[0];
    return `<span class="mtag">${escH(label)} <button onclick="remInv('${escJ(m)}','${tagsId}')">×</button></span>`;
  }).join('');
}
function iKD(e, tagsId, inpId, sugId) {
  if (e.key==='Enter') { e.preventDefault(); const v=e.target.value.trim(); if(v) addInv(v,tagsId,inpId,sugId); }
}

// ═══════════════════════════════════════════════════
//  MESSAGES
// ═══════════════════════════════════════════════════
async function fetchMsgs(id, poll) {
  const since = poll ? (lastTs[id]||'') : '';
  try {
    const d = await get({action:'getMessages', channelId:id, since});
    const msgs = d.messages||[];
    if (!cache[id]) cache[id]=[];
    if (poll) {
      if (msgs.length) {
        cache[id].push(...msgs);
        msgs.forEach(m=>{ if(m.timestamp>(lastTs[id]||'')) lastTs[id]=m.timestamp; });
        if (id===activeId) { renderMsgs(); scrollBot(); }
      }
    } else {
      cache[id]=msgs;
      msgs.forEach(m=>{ if(m.timestamp>(lastTs[id]||'')) lastTs[id]=m.timestamp; });
      renderMsgs();
    }
  } catch(e) { if(!poll) toast('Could not load messages'); }
}

function renderMsgs() {
  const area = document.getElementById('msgs');
  const msgs = cache[activeId]||[];
  if (!msgs.length) {
    area.innerHTML='<div style="text-align:center;color:var(--dim);font-size:13px;margin:50px auto">No messages yet — say hello! 👋</div>';
    return;
  }
  let html='', ld='';
  msgs.forEach(msg=>{
    const d=new Date(msg.timestamp), ds=fmtDate(d);
    if (ds!==ld) { html+=`<div class="ddiv"><hr><span>${ds}</span><hr></div>`; ld=ds; }
    const av=ava(msg.senderName||msg.sender);
    const rxns=Object.entries(msg.reactions||{}).filter(([,u])=>u.length>0).map(([e,u])=>{
      const mine=u.includes(ME_EMAIL);
      return `<span class="rx${mine?' mine':''}" onclick="toggleRxn('${escJ(msg.id)}','${e}')" title="${u.join(', ')}">${e} ${u.length}</span>`;
    }).join('');
    html+=`<div class="mg">
      <div class="mav" style="background:${av.bg};color:${av.fg}">${av.i}</div>
      <div class="mb">
        <div class="mm">
          <span class="ms">${escH(msg.senderName||msg.sender)}</span>
          <span class="me">${msg.senderEmail&&msg.senderEmail!==msg.senderName?escH(msg.senderEmail):''}</span>
          <span class="mt">${fmtTime(d)}</span>
        </div>
        <div class="mx">${escH(msg.text)}</div>
        <div class="rxns">${rxns}<button class="arxn" onclick="openEForMsg('${escJ(msg.id)}')">😊</button></div>
      </div>
    </div>`;
  });
  area.innerHTML=html;
}

async function send() {
  const el = document.getElementById('inp');
  const text = el.value.trim();
  if (!text) return;
  if (!API_URL||API_URL==='YOUR_APPS_SCRIPT_URL_HERE') { toast('⚠️ API URL not configured'); return; }
  document.getElementById('sbtn').disabled=true;
  try {
    const r = await post({action:'sendMessage', channelId:activeId, senderEmail:ME_EMAIL, senderName:ME_NAME, text});
    if (r.ok) {
      if (!cache[activeId]) cache[activeId]=[];
      cache[activeId].push({id:r.id, sender:ME_EMAIL, senderEmail:ME_EMAIL, senderName:ME_NAME, text, timestamp:r.timestamp, reactions:{}});
      lastTs[activeId]=r.timestamp;
      el.value=''; el.style.height='auto';
      renderMsgs(); scrollBot();
    } else { toast('Send failed: '+(r.error||'')); }
  } catch(e){ toast('Send failed: '+e.message); }
  document.getElementById('sbtn').disabled=false;
}

async function toggleRxn(msgId, emoji) {
  const msgs=cache[activeId]||[], msg=msgs.find(m=>m.id===msgId); if(!msg) return;
  if (!msg.reactions) msg.reactions={};
  if (!msg.reactions[emoji]) msg.reactions[emoji]=[];
  const idx=msg.reactions[emoji].indexOf(ME_EMAIL);
  if (idx>-1) { msg.reactions[emoji].splice(idx,1); if(!msg.reactions[emoji].length) delete msg.reactions[emoji]; }
  else msg.reactions[emoji].push(ME_EMAIL);
  renderMsgs();
  try { await post({action:'addReaction',channelId:activeId,messageId:msgId,emoji,user:ME_EMAIL}); } catch(e){}
}

// ═══════════════════════════════════════════════════
//  POLLING
// ═══════════════════════════════════════════════════
function startPoll() {
  if (pollT) clearInterval(pollT);
  pollT = setInterval(()=>fetchMsgs(activeId,true), POLL_MS);
}

// ═══════════════════════════════════════════════════
//  EMOJI
// ═══════════════════════════════════════════════════
function buildEP() {
  const ep=document.getElementById('epick');
  EMOJIS.forEach(e=>{
    const b=document.createElement('button'); b.className='ep'; b.textContent=e;
    b.onclick=()=>{ if(emojiTarget) toggleRxn(emojiTarget,e); else { const i=document.getElementById('inp');i.value+=e;i.focus(); } hideEP(); };
    ep.appendChild(b);
  });
}
function toggleEP(){ emojiTarget=null; const ep=document.getElementById('epick'); ep.style.display=ep.style.display==='grid'?'none':'grid'; }
function openEForMsg(id){ emojiTarget=id; document.getElementById('epick').style.display='grid'; }
function hideEP(){ document.getElementById('epick').style.display='none'; emojiTarget=null; }
document.addEventListener('click',e=>{ if(!e.target.closest('#epick')&&!e.target.closest('.ibtn')&&!e.target.closest('.arxn')) hideEP(); });

// ═══════════════════════════════════════════════════
//  MOBILE SIDEBAR
// ═══════════════════════════════════════════════════
function toggleSB(){
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('sbov').classList.toggle('open');
}
function closeSB(){
  document.getElementById('sb').classList.remove('open');
  document.getElementById('sbov').classList.remove('open');
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function mkModal(html) {
  const ol=document.createElement('div'); ol.className='mo';
  ol.innerHTML=`<div class="md">${html}</div>`;
  ol.addEventListener('click',e=>{ if(e.target===ol) ol.remove(); });
  return ol;
}
function ava(name) {
  let h=0; for(const c of (name||'?')) h=(h*31+c.charCodeAt(0))%AVC.length;
  const[fg,bg]=AVC[h];
  const i=(name||'?').split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
  return{fg,bg,i};
}
function fmtDate(d){
  const n=new Date(),y=new Date(n); y.setDate(n.getDate()-1);
  if(d.toDateString()===n.toDateString()) return 'Today';
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
}
function fmtTime(d){ return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escJ(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
function scrollBot(){ const a=document.getElementById('msgs'); a.scrollTop=a.scrollHeight; }
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function shake(id){ const el=document.getElementById(id); if(!el) return; el.style.animation='none'; void el.offsetHeight; el.style.animation='shake .3s'; setTimeout(()=>el.style.animation='',400); }
// openChSettings is defined above as the main function
</script>
